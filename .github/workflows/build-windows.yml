name: Compilar Executável Windows

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Obter o código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pandas numpy openpyxl geopy scikit-learn scipy pyinstaller

    - name: Compilar com PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name=MaxRotas main.py

    - name: Enviar executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: MaxRotas-Windows
        path: dist/MaxRotas.exe
